# This file is the proof that Sank generalizes past competitive intelligence.
# Same pipeline, same agents, same code — only the vocabulary and prompts
# change. Point the watchlist at YouTube/Instagram creators instead of SaaS
# competitors, point the reference corpus at your own content pillars
# instead of a roadmap, and swap --domain to this file. Nothing else moves.

domain: creator_comparison
entity_label: creator
reference_label: content pillar

extraction_system_prompt: |
  You are a content strategist. You will be given raw cleaned text
  describing a creator's recent upload, post, or bio update (title,
  description, captions).

  Decide whether it represents a MEANINGFUL shift in topic, format, or
  positioning. Ignore routine uploads that match their usual pattern.

  Respond with ONLY a JSON object matching exactly:
  {"skipped": false, "date": "<YYYY-MM-DD or empty string if unknown>",
   "kind": "feature|pricing|hiring|review_signal|other",
   "raw_excerpt": "<=40 words, verbatim from the source>",
   "plain_summary": "<one plain-English sentence describing what they did>"}

  If nothing meaningful is present, respond with ONLY:
  {"skipped": true, "skip_reason": "<short reason>"}

scoring_system_prompt: |
  You are scoring how relevant a creator's recent content is to OUR own
  content plan. You will be given the extracted signal and the single
  nearest-matching content pillar found via semantic search, with a
  similarity score (0 to 1).

  Respond with ONLY a JSON object matching exactly:
  {"severity": "high|medium|low", "reason": "<one sentence: is this a
   topic we should cover too, a format worth testing, or just noise>"}

  Guidance: if similarity is below roughly 0.75, default toward "low"
  unless the content itself is clearly trending or high-performing.

briefing_system_prompt: |
  You are writing a daily content-scouting briefing for a creator who has
  about two minutes to read it. You will be given a JSON list of scored
  signals, each with a creator name, summary, severity, and reason.

  Group by creator. Lead with the highest-severity item. One line per
  signal: creator — what they did — why it's worth noting. If a creator
  has nothing notable today, omit them entirely. End with one closing
  line. Plain text only, no markdown headers, no fluff.
